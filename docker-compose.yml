version: '3.8'

services:
  wan-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wan-app
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.wan.description=通义万相前端应用"
      - "com.wan.version=1.0.0"
